<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keepr Notes</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <header class="kp-header">
      <div class="kp-brand">
        <span class="kp-logo" aria-hidden="true">📌</span>
        <span class="kp-brand-name">Keepr Notes</span>
        <button id="btn-options" class="kp-gear" type="button" data-i18n-title="optionsTitle" title="Settings" aria-label="Settings">⚙</button>
      </div>
      <nav class="kp-tabs" role="tablist">
        <button class="kp-tab kp-tab--active" id="tab-video" data-view="video" role="tab" aria-selected="true" aria-controls="view-video" data-i18n="tabVideo">This video</button>
        <button class="kp-tab" id="tab-library" data-view="library" role="tab" aria-selected="false" aria-controls="view-library" tabindex="-1" data-i18n="tabLibrary">Library</button>
      </nav>
    </header>

    <!-- VISTA: video actual -->
    <section id="view-video" class="kp-view" role="tabpanel" aria-labelledby="tab-video" tabindex="0">
      <div id="video-title" class="kp-video-title" data-i18n="videoPlaceholder">Open a YouTube video to take notes…</div>

      <div class="kp-actions">
        <button id="btn-add" class="kp-btn kp-btn--primary" disabled data-i18n="addNote">
          + Note at current time
        </button>
        <button id="btn-export-md" class="kp-btn" disabled data-i18n="exportMd">Export .md</button>
      </div>

      <div class="kp-toolbar">
        <input id="search-notes" class="kp-search" type="search" data-i18n-ph="searchNotesPh" placeholder="Search these notes…" disabled />
        <select id="sort-notes" class="kp-select" disabled data-i18n-title="sortTitle" title="Sort">
          <option value="time" data-i18n="sortTime">By time</option>
          <option value="created" data-i18n="sortCreated">Newest</option>
          <option value="updated" data-i18n="sortUpdated">Last edited</option>
        </select>
      </div>

      <ul id="notes-list" class="kp-notes"></ul>
      <div id="notes-empty" class="kp-empty">
        <div class="kp-empty-art" aria-hidden="true">📝</div>
        <p data-i18n="emptyNotes">No notes yet. Press + Note here, the player button, or Alt+N while watching.</p>
      </div>
    </section>

    <!-- VISTA: biblioteca -->
    <section id="view-library" class="kp-view kp-hidden" role="tabpanel" aria-labelledby="tab-library" tabindex="0">
      <input id="search-lib" class="kp-search" type="search" data-i18n-ph="searchLibPh" placeholder="Search notes across all videos…" />
      <ul id="library-list" class="kp-library"></ul>
      <div id="library-empty" class="kp-empty">
        <div class="kp-empty-art" aria-hidden="true">📚</div>
        <p data-i18n="emptyLib">No notes saved on any video yet.</p>
      </div>

      <div class="kp-backup">
        <h3 class="kp-backup-title" data-i18n="backupTitle">Your data</h3>
        <p class="kp-backup-hint" data-i18n="backupHint">
          Everything is stored only on this device. Make a backup so it survives anything.
        </p>
        <div class="kp-actions">
          <button id="btn-backup" class="kp-btn" data-i18n="backup">Backup (.json)</button>
          <button id="btn-restore" class="kp-btn" data-i18n="restore">Restore…</button>
          <input id="file-restore" type="file" accept="application/json,.json" hidden />
        </div>
      </div>
    </section>

    <div id="kp-status" class="kp-status" role="status" aria-live="polite"></div>

    <script src="../lib/compat.js"></script>
    <script src="../lib/i18n.js"></script>
    <script src="../lib/notes.js"></script>
    <script src="sidepanel.js"></script>
  </body>
</html>
